name: E2E macOS Install Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger

jobs:
  e2e-macos-install:
    name: End-to-end install (macOS)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Verify clean state
        run: |
          echo "=== Verifying clean macOS runner ==="
          ls ~/.pi/agent 2>/dev/null && echo "⚠ ~/.pi/agent exists" || echo "✓ Clean - no existing install"
          echo "Node: $(node -v 2>/dev/null || echo 'not installed')"
          echo "npm: $(npm -v 2>/dev/null || echo 'not installed')"
          echo "brew: $(brew --version 2>/dev/null | head -1 || echo 'not installed')"

      - name: Download latest release tarball
        run: |
          mkdir -p dist
          # Download the latest published tarball (what real users get)
          curl -fSL --retry 3 --max-time 120 \
            "https://github.com/sweetcheeks72/helios-team-installer/releases/latest/download/helios-agent-latest.tar.gz" \
            -o dist/helios-agent-latest.tar.gz
          curl -fSL --retry 3 --max-time 30 \
            "https://github.com/sweetcheeks72/helios-team-installer/releases/latest/download/VERSION" \
            -o dist/VERSION
          echo "Tarball size: $(du -h dist/helios-agent-latest.tar.gz | cut -f1)"
          echo "Version: $(cat dist/VERSION)"

      - name: Simulate fresh install (extract tarball + setup)
        run: |
          # Create ~/.pi/agent and extract tarball (simulates what install.sh does)
          mkdir -p ~/.pi/agent
          tar -xzf dist/helios-agent-latest.tar.gz -C ~/.pi/agent --strip-components=1
          
          # Write VERSION
          cp dist/VERSION ~/.pi/agent/VERSION
          
          # Set up provider config (simulates the interactive selection step)
          cp provider-configs/anthropic.json ~/.pi/agent/settings.json
          
          # Create minimal .env (simulates user entering a dummy key)
          cp .env.template ~/.pi/agent/.env
          echo "ANTHROPIC_API_KEY=sk-ant-test-ci-dummy-key" >> ~/.pi/agent/.env
          
          echo "✓ Tarball extracted to ~/.pi/agent"
          echo "Files: $(find ~/.pi/agent -type f | wc -l | tr -d ' ')"

      - name: Install Pi CLI
        run: |
          npm install -g @mariozechner/pi-coding-agent 2>&1 || echo "⚠ Pi install failed (may need auth)"
          which pi && echo "✓ Pi CLI installed: $(pi --version 2>/dev/null | head -1)" || echo "⚠ Pi CLI not in PATH"

      - name: Run installer in update mode
        run: |
          # Run install.sh --update which skips interactive prompts
          # This tests: pi update (package install), skill deps, MCP setup, etc.
          bash install.sh --update 2>&1 | tee /tmp/install-output.log || true
          echo ""
          echo "=== Install completed ==="

      - name: Run feature parity verification
        run: |
          bash tests/e2e_feature_parity.sh 2>&1 | tee /tmp/feature-parity.log

      - name: Run existing verify.sh
        run: |
          bash verify.sh 2>&1 | tee /tmp/verify-output.log
      
      - name: Check results
        run: |
          echo "=== Feature Parity Results ==="
          tail -15 /tmp/feature-parity.log
          echo ""
          echo "=== Verify Results ==="
          tail -15 /tmp/verify-output.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: install-logs
          path: |
            /tmp/install-output.log
            /tmp/feature-parity.log
            /tmp/verify-output.log
            install.log
