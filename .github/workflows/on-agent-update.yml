name: Rebuild release on agent update

on:
  repository_dispatch:
    types: [agent-updated]

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Dispatch rebuild-assets event
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'rebuild-assets',
              client_payload: {
                trigger: 'agent-updated',
                agent_sha: '${{ github.event.client_payload.sha }}',
              }
            });
            core.info('Dispatched rebuild-assets event');
