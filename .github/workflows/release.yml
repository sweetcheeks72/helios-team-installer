# =============================================================================
# release.yml — GitHub Actions: Build & Release helios-agent tarball
# =============================================================================
#
# Triggers on tag push matching v* (e.g. v1.2.0, v2.0.0-beta.1).
#
# This workflow runs IN the installer repo but fetches from the agent repo:
#   https://github.com/sweetcheeks72/helios-agent
#
# Workflow steps:
#   1. Check out THIS installer repo (for build-release.sh)
#   2. Check out the helios-agent repo (to ~/.pi/agent equivalent)
#   3. Run build-release.sh with the tag version
#   4. Create a GitHub Release with tarball + checksum as assets
# =============================================================================

name: Release helios-agent

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # Required to create GitHub Releases
  id-token: write   # Required for Sigstore keyless signing (OIDC)

jobs:
  build-and-release:
    name: Build tarball and publish release
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out the installer repo (contains build-release.sh)
      # -----------------------------------------------------------------------
      - name: Check out installer repo
        uses: actions/checkout@v4
        with:
          path: installer

      # -----------------------------------------------------------------------
      # 2. Check out the helios-agent source repo
      #    Clones into the location build-release.sh expects: ~/.pi/agent/
      # -----------------------------------------------------------------------
      - name: Check out helios-agent source
        uses: actions/checkout@v4
        with:
          repository: sweetcheeks72/helios-agent
          path: helios-agent-src
          token: ${{ secrets.HELIOS_AGENT_READ_TOKEN }}

      - name: Install helios-agent to expected location
        run: |
          mkdir -p "${HOME}/.pi"
          cp -r helios-agent-src "${HOME}/.pi/agent"
          echo "✅ helios-agent installed to ~/.pi/agent/"
          ls -la "${HOME}/.pi/agent/" | head -20

      # -----------------------------------------------------------------------
      # 3. Parse version from the git tag (strip leading 'v')
      # -----------------------------------------------------------------------
      - name: Resolve release version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "TAG=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "VERSION=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "📌 Tag: ${TAG}  →  Version: ${VERSION}"

      # -----------------------------------------------------------------------
      # 4. Make build-release.sh executable and run it
      # -----------------------------------------------------------------------
      - name: Make build-release.sh executable
        run: chmod +x installer/build-release.sh

      - name: Build release tarball
        run: |
          cd installer
          ./build-release.sh "${{ steps.version.outputs.VERSION }}"

      # -----------------------------------------------------------------------
      # 5. Verify the expected artefacts were created
      # -----------------------------------------------------------------------
      - name: Verify artefacts
        id: artefacts
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TARBALL="installer/dist/helios-agent-v${VERSION}.tar.gz"
          CHECKSUM="installer/dist/helios-agent-v${VERSION}.tar.gz.sha256"

          if [[ ! -f "${TARBALL}" ]]; then
            echo "❌ Tarball not found: ${TARBALL}"
            exit 1
          fi
          if [[ ! -f "${CHECKSUM}" ]]; then
            echo "❌ Checksum not found: ${CHECKSUM}"
            exit 1
          fi

          echo "TARBALL=${TARBALL}" >> "${GITHUB_OUTPUT}"
          echo "CHECKSUM=${CHECKSUM}" >> "${GITHUB_OUTPUT}"

          echo "✅ Tarball:  ${TARBALL}  ($(du -sh "${TARBALL}" | cut -f1))"
          echo "✅ Checksum: ${CHECKSUM} ($(du -sh "${CHECKSUM}" | cut -f1))"
          cat "${CHECKSUM}"

      # -----------------------------------------------------------------------
      # 5b. Sigstore keyless signing (supply chain integrity)
      # -----------------------------------------------------------------------
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign release tarball (Sigstore keyless)
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TARBALL="installer/dist/helios-agent-v${VERSION}.tar.gz"
          LATEST="installer/dist/helios-agent-latest.tar.gz"
          
          echo "=== Signing versioned tarball ==="
          cosign sign-blob "${TARBALL}" \
            --bundle "${TARBALL}.sigstore.json" \
            --yes
          echo "✅ Signed: ${TARBALL}"
          
          echo "=== Signing latest tarball ==="
          cosign sign-blob "${LATEST}" \
            --bundle "${LATEST}.sigstore.json" \
            --yes
          echo "✅ Signed: ${LATEST}"
          
          echo ""
          echo "Users can verify with:"
          echo "  cosign verify-blob helios-agent-v${VERSION}.tar.gz \\"
          echo "    --bundle helios-agent-v${VERSION}.tar.gz.sigstore.json \\"
          echo "    --certificate-identity-regexp 'github.com/sweetcheeks72' \\"
          echo "    --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'"

      # -----------------------------------------------------------------------
      # 5c. SBOM generation (Software Bill of Materials)
      # -----------------------------------------------------------------------
      - name: Generate SBOM
        run: |
          # Install trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          
          # Generate SBOM from the agent directory
          trivy fs --format spdx-json \
            --output installer/dist/helios-sbom.spdx.json \
            "${HOME}/.pi/agent/"
          
          echo "✅ SBOM generated"
          echo "Packages: $(jq '.packages | length' installer/dist/helios-sbom.spdx.json 2>/dev/null || echo 'N/A')"
          echo "Size: $(du -h installer/dist/helios-sbom.spdx.json | cut -f1)"

      # -----------------------------------------------------------------------
      # 6. Create the GitHub Release and upload assets
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "helios-agent ${{ github.ref_name }}"
          body: |
            ## helios-agent ${{ github.ref_name }}

            ### Installation
            Download the tarball and verify the checksum before installing:

            ```bash
            # Download
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/helios-agent-v${{ steps.version.outputs.VERSION }}.tar.gz
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/helios-agent-v${{ steps.version.outputs.VERSION }}.tar.gz.sha256

            # Verify checksum (Linux)
            sha256sum -c helios-agent-v${{ steps.version.outputs.VERSION }}.tar.gz.sha256

            # Verify checksum (macOS)
            shasum -a 256 -c helios-agent-v${{ steps.version.outputs.VERSION }}.tar.gz.sha256

            # Verify Sigstore signature (requires cosign)
            cosign verify-blob helios-agent-v${{ steps.version.outputs.VERSION }}.tar.gz \
              --bundle helios-agent-v${{ steps.version.outputs.VERSION }}.tar.gz.sigstore.json \
              --certificate-identity-regexp 'github.com/sweetcheeks72' \
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'

            # Extract
            tar -xzf helios-agent-v${{ steps.version.outputs.VERSION }}.tar.gz
            ```

            Then run `install.sh` from the installer repo to complete setup.

            ---
            Built from [sweetcheeks72/helios-agent](https://github.com/sweetcheeks72/helios-agent) at `${{ github.ref_name }}`.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ${{ steps.artefacts.outputs.TARBALL }}
            ${{ steps.artefacts.outputs.CHECKSUM }}
            ${{ steps.artefacts.outputs.TARBALL }}.sigstore.json
            installer/dist/VERSION
            installer/dist/helios-agent-latest.tar.gz
            installer/dist/helios-agent-latest.tar.gz.sha256
            installer/dist/helios-agent-latest.tar.gz.sigstore.json
            installer/dist/helios-sbom.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 7. Trigger upload-assets to build and attach platform packages
      #    (bootstrap.sh, install.sh, helios-latest-darwin-{arm64,x64}.tar.gz)
      #    Without this step, the release has only agent tarballs — no installer.
      # -----------------------------------------------------------------------
      - name: Trigger upload-assets workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'rebuild-assets',
              client_payload: {
                trigger: 'release-created',
                release_tag: '${{ github.ref_name }}',
              }
            });
            core.info(`Dispatched rebuild-assets for tag ${{ github.ref_name }}`);
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
