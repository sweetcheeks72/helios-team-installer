# =============================================================================
# test.yml — GitHub Actions CI for helios-team-installer
# =============================================================================
# Jobs:
#   1. shellcheck     — lint all shell scripts
#   2. bats-ubuntu    — run BATS tests on Ubuntu
#   3. bats-macos     — run BATS tests on macOS
#   4. tarball-audit  — validate tarball structure (placeholder)
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  # ─── Job 1: ShellCheck ──────────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck -S warning \
            -e SC2034 -e SC1090 -e SC1091 -e SC2155 -e SC2088 \
            -e SC2015 -e SC2129 -e SC2126 -e SC2086 -e SC2024 -e SC2093 \
            install.sh build-release.sh verify.sh uninstall.sh \
            sync-from-agent.sh bootstrap.sh

  # ─── Job 2: BATS on Ubuntu ──────────────────────────────────────────────────
  bats-ubuntu:
    name: BATS tests (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install BATS
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats

      - name: Run unit tests
        run: bats --tap tests/unit_tests.bats

      - name: Run tarball audit (skips if no tarball)
        run: bats --tap tests/tarball_audit.bats

  # ─── Job 3: BATS on macOS ───────────────────────────────────────────────────
  bats-macos:
    name: BATS tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install BATS
        run: brew install bats-core

      - name: Run unit tests
        run: bats --tap tests/unit_tests.bats

      - name: Run tarball audit (skips if no tarball)
        run: bats --tap tests/tarball_audit.bats

  # ─── Job 4: Tarball Audit (placeholder) ─────────────────────────────────────
  tarball-audit:
    name: Tarball audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Info
        run: |
          echo "Tarball audit tests run in bats-ubuntu/bats-macos jobs."
          echo "Tests auto-skip when no tarball is present in dist/."
          echo "For full audit: ./build-release.sh <version> && bats tests/tarball_audit.bats"

  # ─── Job 5: Windows PowerShell Syntax Check ─────────────────────────────────
  windows-syntax:
    name: Windows installer syntax
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: PowerShell syntax check (install.ps1)
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/install.ps1", [ref]$null, [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
          Write-Host "install.ps1 — no syntax errors"

      - name: Batch file lint checks (install.bat)
        shell: pwsh
        run: |
          $content = Get-Content install.bat -Raw
          
          # Check 1: No double wsl invocations (regex)
          $doubleWsl = Select-String -Path install.bat -Pattern 'wsl.*-d.*bash\s+-c\s+wsl' -AllMatches
          if ($doubleWsl) {
            Write-Error "Double wsl invocation detected:"
            $doubleWsl | ForEach-Object { Write-Error $_.Line }
            exit 1
          }
          Write-Host "No double wsl invocations found ✓"
          
          # Check 2: No hardcoded 'wsl -d Ubuntu' (should use %_UBUNTU_DISTRO%)
          # Exclude comments (lines starting with ::) and the wsl --install line
          $hardcoded = Get-Content install.bat | Where-Object { 
            $_ -match 'wsl\s+-d\s+Ubuntu\b' -and $_ -notmatch '^::' -and $_ -notmatch 'wsl --install'
          }
          if ($hardcoded) {
            Write-Error "Hardcoded 'wsl -d Ubuntu' found (should use %_UBUNTU_DISTRO%):"
            $hardcoded | ForEach-Object { Write-Error $_ }
            exit 1
          }
          Write-Host "No hardcoded Ubuntu distro names ✓"

      - name: Anti-regression checks
        shell: pwsh
        run: |
          $failed = $false
          
          # Check 1: No 'bash -c wsl' pattern (causes command-not-found inside WSL)
          $bashCWsl = Select-String -Path install.ps1,install.bat -Pattern 'bash\s+-c\s+wsl' -AllMatches 2>$null
          if ($bashCWsl) {
            Write-Error "Found 'bash -c wsl' anti-pattern (causes command-not-found inside WSL):"
            $bashCWsl | ForEach-Object { Write-Error "$($_.Filename):$($_.LineNumber): $($_.Line)" }
            $failed = $true
          }
          
          # Check 2: No hardcoded 'wsl -d Ubuntu' in install.ps1 (should use $ubuntuDistro)
          $ps1Hardcoded = Get-Content install.ps1 | Where-Object {
            $_ -match 'wsl\s+-d\s+Ubuntu\b' -and $_ -notmatch '^\s*#' -and $_ -notmatch 'wsl --install'
          }
          if ($ps1Hardcoded) {
            Write-Error "Hardcoded 'wsl -d Ubuntu' in install.ps1:"
            $ps1Hardcoded | ForEach-Object { Write-Error $_ }
            $failed = $true
          }
          
          # Check 3: No hardcoded 'wsl -d Ubuntu' in install.bat (should use %_UBUNTU_DISTRO%)
          $batHardcoded = Get-Content install.bat | Where-Object {
            $_ -match 'wsl\s+-d\s+Ubuntu\b' -and $_ -notmatch '^::' -and $_ -notmatch 'wsl --install'
          }
          if ($batHardcoded) {
            Write-Error "Hardcoded 'wsl -d Ubuntu' in install.bat:"
            $batHardcoded | ForEach-Object { Write-Error $_ }
            $failed = $true
          }
          
          if ($failed) { exit 1 }
          Write-Host "All anti-regression checks passed ✓"
