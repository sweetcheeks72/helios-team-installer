name: Upload Release Assets
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload to (default: latest)"
        required: false
        default: ""

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve release tag
        id: resolve
        run: |
          if [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(gh release view --repo ${{ github.repository }} --json tagName --jq '.tagName')
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved release tag: $(cat "$GITHUB_OUTPUT" | grep tag= | cut -d= -f2)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build slim tarballs
        run: |
          set -e
          RELEASE_TAG="${{ steps.resolve.outputs.tag }}"
          
          # Download the existing agent tarball (already on the release)
          mkdir -p /tmp/dl
          gh release download "$RELEASE_TAG" --pattern "helios-agent-latest-darwin-arm64.tar.gz" --dir /tmp/dl || true
          
          if [[ ! -f /tmp/dl/helios-agent-latest-darwin-arm64.tar.gz ]]; then
            echo "::error::Agent tarball not found on release — cannot build package"
            exit 1
          fi
          
          # Download CLI binaries from helios-installer
          mkdir -p /tmp/cli
          gh release download --repo helios-agi/helios-installer --pattern "pi-darwin-arm64.tar.gz" --dir /tmp/cli
          gh release download --repo helios-agi/helios-installer --pattern "pi-darwin-x64.tar.gz" --dir /tmp/cli
          
          # Download fd binaries for both architectures
          mkdir -p /tmp/fd
          curl -fsSL "https://github.com/sharkdp/fd/releases/download/v10.2.0/fd-v10.2.0-aarch64-apple-darwin.tar.gz" -o /tmp/fd/fd-arm64.tar.gz
          curl -fsSL "https://github.com/sharkdp/fd/releases/download/v10.2.0/fd-v10.2.0-x86_64-apple-darwin.tar.gz" -o /tmp/fd/fd-x64.tar.gz
          tar xzf /tmp/fd/fd-arm64.tar.gz -C /tmp/fd/ && mv /tmp/fd/fd-v10.2.0-aarch64-apple-darwin/fd /tmp/fd/fd-arm64
          tar xzf /tmp/fd/fd-x64.tar.gz -C /tmp/fd/ && mv /tmp/fd/fd-v10.2.0-x86_64-apple-darwin/fd /tmp/fd/fd-x64
          
          # Download Node 22 LTS binaries (bundled runtime for users on Node 24+)
          mkdir -p /tmp/node22
          NODE22_VER="22.22.0"
          curl -fsSL "https://nodejs.org/dist/v${NODE22_VER}/node-v${NODE22_VER}-darwin-arm64.tar.gz" -o /tmp/node22/node22-arm64.tar.gz
          curl -fsSL "https://nodejs.org/dist/v${NODE22_VER}/node-v${NODE22_VER}-darwin-x64.tar.gz" -o /tmp/node22/node22-x64.tar.gz
          mkdir -p /tmp/node22/arm64 /tmp/node22/x64
          tar xzf /tmp/node22/node22-arm64.tar.gz --strip-components=1 -C /tmp/node22/arm64
          tar xzf /tmp/node22/node22-x64.tar.gz --strip-components=1 -C /tmp/node22/x64
          echo "✓ Downloaded Node ${NODE22_VER} for arm64 + x64"
          
          mkdir -p /tmp/build-arm64
          
          # Extract agent tarball
          tar xzf /tmp/dl/helios-agent-latest-darwin-arm64.tar.gz --strip-components=1 -C /tmp/build-arm64
          cd /tmp/build-arm64
          
          # ─── SANITIZATION: Fix issues from machine-built tarball ───────────
          
          # 1. Remove macOS AppleDouble ._ metadata files
          find . -name "._*" -delete 2>/dev/null || true
          echo "✓ Removed ._ AppleDouble files"
          
          # 2. Remove git merge conflict marker files (*~HEAD)
          find . -name "*~HEAD" -delete 2>/dev/null || true
          echo "✓ Removed ~HEAD conflict markers"
          
          # 3. Fix absolute symlinks (point to /Users/... on build machine)
          find . -type l | while read -r link; do
            target=$(readlink "$link")
            case "$target" in
              /Users/*/\.pi/agent/*)
                # Convert absolute path to relative
                rel_target="${target#*/\.pi/agent/}"
                link_dir=$(dirname "$link")
                # Compute relative path from link location to target
                rel_path=$(python3 -c "
          import os.path
          link_dir = os.path.normpath('$link_dir')
          target = os.path.normpath('$rel_target')
          print(os.path.relpath(target, link_dir))
          ")
                rm -f "$link"
                ln -s "$rel_path" "$link"
                echo "  Fixed: $link -> $rel_path"
                ;;
              /*)
                echo "  WARNING: Unknown absolute symlink: $link -> $target"
                ;;
            esac
          done
          echo "✓ Fixed absolute symlinks"
          
          # 4. Verify critical symlink targets exist
          find . -type l | while read -r link; do
            if [[ ! -e "$link" ]]; then
              echo "  WARNING: Broken symlink: $link -> $(readlink "$link")"
              # If target doesn't exist but we can find it under helios-agi instead of sweetcheeks72:
              target=$(readlink "$link")
              fixed_target="${target//sweetcheeks72/helios-agi}"
              link_dir=$(dirname "$link")
              if [[ -e "$link_dir/$fixed_target" ]]; then
                rm -f "$link"
                ln -s "$fixed_target" "$link"
                echo "  Auto-fixed: $link -> $fixed_target"
              fi
            fi
          done
          echo "✓ Verified symlinks"
          
          # 5. Create sessions/ placeholder (prevents ENOENT on first run)
          mkdir -p sessions
          echo '{}' > sessions/.gitkeep
          echo "✓ Created sessions/ placeholder"
          
          # 6. Slim down: remove large non-essential files
          rm -rf governance/events*.jsonl brainv2/desktop-events*.jsonl dlq-archive/
          echo "✓ Removed large event logs"
          
          # 7. Strip non-essential native prebuilds (keep darwin + linux-x64)
          for d in node_modules/koffi/build/koffi/*/; do
            case "$(basename "$d")" in darwin_arm64|darwin_x64|linux_x64|linux_arm64) ;; *) rm -rf "$d" ;; esac
          done
          for pkg in tree-sitter tree-sitter-typescript tree-sitter-javascript; do
            if [[ -d "node_modules/$pkg/prebuilds" ]]; then
              for d in "node_modules/$pkg/prebuilds"/*/; do
                case "$(basename "$d")" in darwin-arm64|darwin-x64|linux-x64|linux-arm64) ;; *) rm -rf "$d" ;; esac
              done
            fi
          done
          if [[ -d git/github.com/helios-agi/pi-interactive-shell/node_modules/node-pty/prebuilds ]]; then
            for d in git/github.com/helios-agi/pi-interactive-shell/node_modules/node-pty/prebuilds/*/; do
              case "$(basename "$d")" in darwin-arm64|darwin-x64|linux-x64|linux-arm64) ;; *) rm -rf "$d" ;; esac
            done
          fi
          echo "✓ Stripped non-essential prebuilds (kept darwin + linux)"
          
          # 8. Ensure better-sqlite3 has prebuilds for both archs (downloads from GH releases)
          BS3_DIR="node_modules/better-sqlite3"
          if [[ -d "$BS3_DIR" ]]; then
            BS3_VER=$(node -p "require('./$BS3_DIR/package.json').version")
            echo "better-sqlite3 version: $BS3_VER"
            mkdir -p "$BS3_DIR/prebuilds/darwin-arm64" "$BS3_DIR/prebuilds/darwin-x64"
            
            # Download prebuilds from better-sqlite3 GitHub releases
            for arch in arm64 x64; do
              node_abi=$(node -p "process.versions.modules")  # e.g., 131 for Node 22
              prebuild_url="https://github.com/nicobailon/better-sqlite3/releases/download/v${BS3_VER}/better-sqlite3-v${BS3_VER}-node-v${node_abi}-darwin-${arch}.tar.gz"
              echo "  Downloading: darwin-${arch} (node ABI v${node_abi})..."
              if curl -fsSL "$prebuild_url" -o "/tmp/bs3-${arch}.tar.gz" 2>/dev/null; then
                tar xzf "/tmp/bs3-${arch}.tar.gz" -C "$BS3_DIR/prebuilds/darwin-${arch}/" 2>/dev/null || true
                # prebuild-install tarballs extract to build/Release/better_sqlite3.node
                if [[ -f "$BS3_DIR/prebuilds/darwin-${arch}/build/Release/better_sqlite3.node" ]]; then
                  mv "$BS3_DIR/prebuilds/darwin-${arch}/build/Release/better_sqlite3.node" "$BS3_DIR/prebuilds/darwin-${arch}/better_sqlite3.node"
                  rm -rf "$BS3_DIR/prebuilds/darwin-${arch}/build"
                fi
                echo "  ✓ darwin-${arch} prebuild ready"
              else
                # Try WiseLibs (upstream) if our fork doesn't have it
                prebuild_url="https://github.com/WiseLibs/better-sqlite3/releases/download/v${BS3_VER}/better-sqlite3-v${BS3_VER}-node-v${node_abi}-darwin-${arch}.tar.gz"
                echo "  Retrying from WiseLibs: darwin-${arch}..."
                if curl -fsSL "$prebuild_url" -o "/tmp/bs3-${arch}.tar.gz" 2>/dev/null; then
                  tar xzf "/tmp/bs3-${arch}.tar.gz" -C "$BS3_DIR/prebuilds/darwin-${arch}/" 2>/dev/null || true
                  if [[ -f "$BS3_DIR/prebuilds/darwin-${arch}/build/Release/better_sqlite3.node" ]]; then
                    mv "$BS3_DIR/prebuilds/darwin-${arch}/build/Release/better_sqlite3.node" "$BS3_DIR/prebuilds/darwin-${arch}/better_sqlite3.node"
                    rm -rf "$BS3_DIR/prebuilds/darwin-${arch}/build"
                  fi
                  echo "  ✓ darwin-${arch} prebuild ready (from WiseLibs)"
                else
                  echo "  ⚠ Could not download prebuild for darwin-${arch}"
                fi
              fi
            done
            
            # Also place the correct prebuild in build/Release/ for each arch package
            # (bindings module looks here first)
            mkdir -p "$BS3_DIR/build/Release"
            echo "✓ better-sqlite3 prebuilds configured"
          fi
          
          cd -
          
          # ─── BUILD PACKAGE STRUCTURE ───────────────────────────────────────
          
          mkdir -p /tmp/pkg-arm64/helios/{agent,cli/pi,installer}
          mkdir -p /tmp/pkg-x64/helios/{agent,cli/pi,installer}
          
          # Copy agent (same content for both — multi-arch prebuilds inside)
          if [[ -d /tmp/build-arm64 ]] && [[ "$(ls /tmp/build-arm64)" ]]; then
            cp -a /tmp/build-arm64/. /tmp/pkg-arm64/helios/agent/
            cp -a /tmp/build-arm64/. /tmp/pkg-x64/helios/agent/
          fi
          
          # Set correct better-sqlite3 build/Release per architecture
          # (bindings module loads from build/Release/better_sqlite3.node)
          if [[ -f /tmp/pkg-arm64/helios/agent/node_modules/better-sqlite3/prebuilds/darwin-arm64/better_sqlite3.node ]]; then
            cp /tmp/pkg-arm64/helios/agent/node_modules/better-sqlite3/prebuilds/darwin-arm64/better_sqlite3.node \
               /tmp/pkg-arm64/helios/agent/node_modules/better-sqlite3/build/Release/better_sqlite3.node
          fi
          if [[ -f /tmp/pkg-x64/helios/agent/node_modules/better-sqlite3/prebuilds/darwin-x64/better_sqlite3.node ]]; then
            cp /tmp/pkg-x64/helios/agent/node_modules/better-sqlite3/prebuilds/darwin-x64/better_sqlite3.node \
               /tmp/pkg-x64/helios/agent/node_modules/better-sqlite3/build/Release/better_sqlite3.node
          fi
          
          # Set correct fd binary per architecture
          cp /tmp/fd/fd-arm64 /tmp/pkg-arm64/helios/agent/bin/fd && chmod +x /tmp/pkg-arm64/helios/agent/bin/fd
          cp /tmp/fd/fd-x64 /tmp/pkg-x64/helios/agent/bin/fd && chmod +x /tmp/pkg-x64/helios/agent/bin/fd
          
          # Bundle Node 22 runtime (Strategy 0 in installer — avoids download for Node 24+ users)
          mkdir -p /tmp/pkg-arm64/helios/agent/.runtime/node22/{bin,lib}
          mkdir -p /tmp/pkg-x64/helios/agent/.runtime/node22/{bin,lib}
          cp /tmp/node22/arm64/bin/node /tmp/pkg-arm64/helios/agent/.runtime/node22/bin/
          cp -a /tmp/node22/arm64/lib/node_modules /tmp/pkg-arm64/helios/agent/.runtime/node22/lib/ 2>/dev/null || true
          cp /tmp/node22/x64/bin/node /tmp/pkg-x64/helios/agent/.runtime/node22/bin/
          cp -a /tmp/node22/x64/lib/node_modules /tmp/pkg-x64/helios/agent/.runtime/node22/lib/ 2>/dev/null || true
          chmod +x /tmp/pkg-arm64/helios/agent/.runtime/node22/bin/node
          chmod +x /tmp/pkg-x64/helios/agent/.runtime/node22/bin/node
          echo "✓ Bundled Node 22 runtime for both architectures"
          
          # Copy installer
          cp install.sh /tmp/pkg-arm64/helios/installer/
          cp install.sh /tmp/pkg-x64/helios/installer/
          cp -a lib/ /tmp/pkg-arm64/helios/installer/lib/ 2>/dev/null || true
          cp -a lib/ /tmp/pkg-x64/helios/installer/lib/ 2>/dev/null || true
          cp -a provider-configs/ /tmp/pkg-arm64/helios/installer/provider-configs/ 2>/dev/null || true
          cp -a provider-configs/ /tmp/pkg-x64/helios/installer/provider-configs/ 2>/dev/null || true
          
          # Copy bootstrap.sh for convenience
          cp bootstrap.sh /tmp/pkg-arm64/helios/installer/bootstrap.sh 2>/dev/null || true
          cp bootstrap.sh /tmp/pkg-x64/helios/installer/bootstrap.sh 2>/dev/null || true
          
          # Copy CLI binaries (arch-specific)
          tar xzf /tmp/cli/pi-darwin-arm64.tar.gz -C /tmp/pkg-arm64/helios/cli/
          tar xzf /tmp/cli/pi-darwin-x64.tar.gz -C /tmp/pkg-x64/helios/cli/
          
          # Write VERSION — must match the agent tarball's VERSION (from agent's package.json)
          # to prevent the update checker from seeing a desync and forcing a spurious downgrade.
          # The agent directory already has its own VERSION file (from the agent build step).
          # Use THAT as the single source of truth for the all-in-one package too.
          if [[ -f /tmp/pkg-arm64/helios/agent/VERSION ]]; then
            VERSION="$(cat /tmp/pkg-arm64/helios/agent/VERSION)"
          else
            VERSION="${RELEASE_TAG#v}"
          fi
          echo "$VERSION" > /tmp/pkg-arm64/helios/VERSION
          echo "$VERSION" > /tmp/pkg-x64/helios/VERSION
          
          # Create tarballs (no ._ files on Linux, but be explicit)
          cd /tmp/pkg-arm64 && tar czf /tmp/helios-latest-darwin-arm64.tar.gz helios/
          cd /tmp/pkg-x64 && tar czf /tmp/helios-latest-darwin-x64.tar.gz helios/
          cp /tmp/helios-latest-darwin-arm64.tar.gz /tmp/helios-latest.tar.gz
          
          # Generate checksums
          cd /tmp
          sha256sum helios-latest-darwin-arm64.tar.gz > helios-latest-darwin-arm64.tar.gz.sha256
          sha256sum helios-latest-darwin-x64.tar.gz > helios-latest-darwin-x64.tar.gz.sha256
          sha256sum helios-latest.tar.gz > helios-latest.tar.gz.sha256
          
          echo ""
          echo "=== Final package sizes ==="
          ls -lh /tmp/helios-latest*.tar.gz
          
          echo ""
          echo "=== Verification ==="
          echo "arm64 better-sqlite3 prebuild:"
          file /tmp/pkg-arm64/helios/agent/node_modules/better-sqlite3/build/Release/better_sqlite3.node 2>/dev/null || echo "  MISSING"
          echo "x64 better-sqlite3 prebuild:"
          file /tmp/pkg-x64/helios/agent/node_modules/better-sqlite3/build/Release/better_sqlite3.node 2>/dev/null || echo "  MISSING"
          echo "arm64 fd:"
          file /tmp/pkg-arm64/helios/agent/bin/fd
          echo "x64 fd:"
          file /tmp/pkg-x64/helios/agent/bin/fd
          echo "sessions/ dir:"
          ls -la /tmp/pkg-arm64/helios/agent/sessions/ | head -3
          echo "Broken symlinks (should be 0):"
          find /tmp/pkg-arm64/helios/agent -type l ! -exec test -e {} \; -print | wc -l
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete stale assets
        run: |
          RELEASE_TAG="${{ steps.resolve.outputs.tag }}"
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/$RELEASE_TAG --jq '.id')
          for name in helios-latest-darwin-arm64.tar.gz helios-latest-darwin-x64.tar.gz helios-latest.tar.gz \
                      helios-latest-darwin-arm64.tar.gz.sha256 helios-latest-darwin-x64.tar.gz.sha256 helios-latest.tar.gz.sha256; do
            asset_id=$(gh api "repos/${{ github.repository }}/releases/$RELEASE_ID/assets" --jq ".[] | select(.name==\"$name\") | .id" 2>/dev/null || true)
            if [[ -n "$asset_id" ]]; then
              gh api -X DELETE "repos/${{ github.repository }}/releases/assets/$asset_id" && echo "Deleted $name"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload assets
        run: |
          RELEASE_TAG="${{ steps.resolve.outputs.tag }}"
          for f in helios-latest-darwin-arm64.tar.gz helios-latest-darwin-x64.tar.gz helios-latest.tar.gz \
                   helios-latest-darwin-arm64.tar.gz.sha256 helios-latest-darwin-x64.tar.gz.sha256 helios-latest.tar.gz.sha256; do
            echo "Uploading $f..."
            gh release upload "$RELEASE_TAG" "/tmp/$f" --repo ${{ github.repository }}
            sleep 2
            echo "✓ $f uploaded"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
